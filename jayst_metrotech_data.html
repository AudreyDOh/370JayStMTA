<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Jay St-Metrotech MTA Data</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #1a1a1a; color: #eee; margin: 0; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .menu { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #333; }
    .menu-item { padding: 12px 24px; cursor: pointer; background: transparent; color: #888; border: none; font-size: 1rem; border-bottom: 3px solid transparent; }
    .menu-item:hover { color: #fff; }
    .menu-item.active { color: #fff; border-bottom-color: #0af; }
    .view { display: none; }
    .view.active { display: block; }
    .raw-view pre { background: #0d0d0d; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; white-space: pre-wrap; }
    .friendly-view { max-width: 600px; }
    .section { margin-bottom: 2rem; }
    .section h3 { font-size: 1rem; color: #0af; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .train-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #252525; border-radius: 8px; margin-bottom: 8px; }
    .train-row.departed { opacity: 0.6; }
    .route-badge { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; flex-shrink: 0; }
    .route-a { background: #0039a6; color: #fff; }
    .route-c { background: #0039a6; color: #fff; }
    .route-f { background: #ff6319; color: #fff; }
    .route-r { background: #fccc0a; color: #000; }
    .route-n { background: #fccc0a; color: #000; }
    .route-q { background: #fccc0a; color: #000; }
    .train-info { flex: 1; }
    .train-destination { font-weight: 600; }
    .train-direction { font-size: 0.85rem; color: #888; }
    .train-eta { font-size: 1.1rem; font-weight: 600; min-width: 70px; text-align: right; }
    .train-eta.arriving { color: #4ade80; }
    .train-eta.departed { color: #888; }
    .empty { color: #666; padding: 24px; text-align: center; }
    .refresh { margin-bottom: 1rem; }
    .refresh-btn { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .refresh-btn:hover { background: #444; }
  </style>
</head>
<body>
  <h1>Jay St–Metrotech</h1>
  <div class="menu">
    <button class="menu-item active" data-view="raw">Raw data</button>
    <button class="menu-item" data-view="friendly">Upcoming arrivals</button>
  </div>

  <div class="refresh">
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>

  <div id="view-friendly" class="view">
    <div class="friendly-view">
      <div class="section">
        <h3>Upcoming arrivals</h3>
        <div id="upcoming-trains"></div>
      </div>
      <div class="section">
        <h3>Recently departed</h3>
        <div id="departed-trains"></div>
      </div>
    </div>
  </div>

  <div id="view-raw" class="view raw-view active">
    <pre id="raw-output">Loading...</pre>
  </div>

  <script src="jayst_metrotech_data.js"></script>
  <script>
    let cachedData = null;

    function renderFriendly(data) {
      const upcoming = data.filter(t => t.etaSeconds >= 0);
      const departed = data.filter(t => t.etaSeconds < 0).slice(0, 10);

      const upcomingEl = document.getElementById('upcoming-trains');
      const departedEl = document.getElementById('departed-trains');

      upcomingEl.innerHTML = upcoming.length
        ? upcoming.map(t => `
          <div class="train-row">
            <span class="route-badge route-${t.route.toLowerCase()}">${t.route}</span>
            <div class="train-info">
              <div class="train-destination">To ${t.destination}</div>
              <div class="train-direction">${t.direction === 'north' ? 'Uptown' : 'Downtown'}</div>
            </div>
            <span class="train-eta arriving">${t.etaFormatted}</span>
          </div>
        `).join('')
        : '<div class="empty">No upcoming trains</div>';

      departedEl.innerHTML = departed.length
        ? departed.map(t => `
          <div class="train-row departed">
            <span class="route-badge route-${t.route.toLowerCase()}">${t.route}</span>
            <div class="train-info">
              <div class="train-destination">To ${t.destination}</div>
              <div class="train-direction">${t.direction === 'north' ? 'Uptown' : 'Downtown'}</div>
            </div>
            <span class="train-eta departed">${t.etaFormatted}</span>
          </div>
        `).join('')
        : '<div class="empty">No recent departures</div>';
    }

    function renderRaw(data) {
      document.getElementById('raw-output').textContent = JSON.stringify(data, null, 2);
    }

    function loadData() {
      document.getElementById('raw-output').textContent = 'Loading...';
      document.getElementById('upcoming-trains').innerHTML = '<div class="empty">Loading...</div>';
      document.getElementById('departed-trains').innerHTML = '';

      fetchJayStMetrotechData()
        .then(data => {
          cachedData = data;
          renderFriendly(data);
          renderRaw(data);
        })
        .catch(err => {
          const msg = 'Error: ' + err.message;
          document.getElementById('raw-output').textContent = msg;
          document.getElementById('upcoming-trains').innerHTML = '<div class="empty">' + msg + '</div>';
        });
    }

    document.querySelectorAll('.menu-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('view-' + btn.dataset.view).classList.add('active');
      });
    });

    loadData();
  </script>
</body>
</html>
