<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jay St–Metrotech — Live Train Arrivals</title>
  <style>
    /* ---- reset & base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a1a;
      --surface:  #252525;
      --border:   #333;
      --text:     #eee;
      --muted:    #888;
      --green:    #4ade80;
      --focus:    #0af;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.25rem;
      font-size: 1rem;
      line-height: 1.5;
    }

    /* ---- skip link ---- */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0;
      background: #000;
      color: #fff;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      z-index: 999;
      text-decoration: none;
    }
    .skip-link:focus { top: 0; }

    /* ---- header ---- */
    header { margin-bottom: 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; }
    .last-updated {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ---- nav tabs ---- */
    nav[aria-label="Page sections"] {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }

    nav button {
      padding: 0.6rem 1.25rem;
      background: transparent;
      color: var(--muted);
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 0.95rem;
      cursor: pointer;
      min-height: 44px; /* WCAG 2.5.5 touch target */
    }
    nav button:hover { color: var(--text); }
    nav button[aria-selected="true"] {
      color: var(--text);
      border-bottom-color: var(--focus);
    }
    nav button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: -2px;
    }

    /* ---- refresh button ---- */
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      min-height: 44px;
      margin-bottom: 1.25rem;
    }
    .refresh-btn:hover { background: #2e2e2e; }
    .refresh-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
    .refresh-btn[aria-disabled="true"] { opacity: 0.5; cursor: not-allowed; }

    /* ---- tab panels ---- */
    [role="tabpanel"] { display: none; }
    [role="tabpanel"].active { display: block; }

    /* ---- arrivals list ---- */
    .arrivals-section { margin-bottom: 2rem; }
    .arrivals-section h2 {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.75rem;
    }

    .train-list {
      list-style: none;
    }

    .train-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .train-item.departed { opacity: 0.55; }

    /* route badge */
    .route-badge {
      width: 2.1rem;
      height: 2.1rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
      flex-shrink: 0;
      /* aria-hidden on badge span; full text on <li> aria-label */
    }
    .route-a, .route-c { background: #0039a6; color: #fff; }
    .route-f            { background: #ff6319; color: #fff; }
    .route-r, .route-n, .route-q { background: #fccc0a; color: #000; }

    .train-info { flex: 1; min-width: 0; }
    .train-destination {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .train-direction { font-size: 0.8rem; color: var(--muted); }

    .train-eta {
      font-size: 1rem;
      font-weight: 600;
      min-width: 4rem;
      text-align: right;
      flex-shrink: 0;
    }
    .train-eta.arriving { color: var(--green); }
    .train-eta.departed { color: var(--muted); }

    /* empty / loading states */
    .state-msg {
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    /* ---- raw view ---- */
    #view-raw pre {
      background: #0d0d0d;
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
    }

    /* ---- sr-only utility ---- */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ---- high-contrast / forced-colors ---- */
    @media (forced-colors: active) {
      .route-badge { border: 2px solid ButtonText; }
      .train-item  { border: 1px solid ButtonText; }
    }
  </style>
</head>
<body>

  <!-- skip nav for keyboard users -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header>
    <h1>Jay St–Metrotech</h1>
    <p class="last-updated" id="last-updated" aria-live="polite"></p>
  </header>

  <!-- tab nav -->
  <nav aria-label="Page sections">
    <button
      role="tab"
      aria-selected="true"
      aria-controls="view-arrivals"
      id="tab-arrivals"
      data-view="arrivals"
    >Upcoming arrivals</button>
    <button
      role="tab"
      aria-selected="false"
      aria-controls="view-raw"
      id="tab-raw"
      data-view="raw"
      tabindex="-1"
    >Raw data</button>
  </nav>

  <button
    class="refresh-btn"
    id="refresh-btn"
    onclick="loadData()"
    aria-label="Refresh train arrival data"
  >
    <span aria-hidden="true">↻</span> Refresh
  </button>

  <main id="main-content">

    <!-- arrivals panel -->
    <div
      id="view-arrivals"
      role="tabpanel"
      aria-labelledby="tab-arrivals"
      class="active"
    >
      <!-- live region: screen reader announces updates silently -->
      <div
        role="status"
        aria-live="polite"
        aria-atomic="true"
        id="arrivals-status"
        class="sr-only"
      ></div>

      <section class="arrivals-section" aria-label="Upcoming trains">
        <h2 aria-hidden="true">Upcoming</h2>
        <ul id="upcoming-trains" class="train-list" aria-label="Upcoming trains">
          <li class="state-msg" role="status">Loading…</li>
        </ul>
      </section>

      <section class="arrivals-section" aria-label="Recently departed trains">
        <h2 aria-hidden="true">Recently departed</h2>
        <ul id="departed-trains" class="train-list" aria-label="Recently departed trains"></ul>
      </section>
    </div>

    <!-- raw data panel -->
    <div
      id="view-raw"
      role="tabpanel"
      aria-labelledby="tab-raw"
      hidden
    >
      <pre id="raw-output" aria-label="Raw JSON data from MTA API">Loading…</pre>
    </div>

  </main>

  <script src="jayst_metrotech_data.js"></script>
  <script>
    /* -------- tab switching -------- */
    const tabs = document.querySelectorAll('[role="tab"]');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => activateTab(tab));
      tab.addEventListener('keydown', e => {
        const list = [...tabs];
        const idx  = list.indexOf(e.target);
        let next;
        if (e.key === 'ArrowRight') next = list[(idx + 1) % list.length];
        if (e.key === 'ArrowLeft')  next = list[(idx - 1 + list.length) % list.length];
        if (e.key === 'Home') next = list[0];
        if (e.key === 'End')  next = list[list.length - 1];
        if (next) { e.preventDefault(); next.focus(); activateTab(next); }
      });
    });

    function activateTab(tab) {
      tabs.forEach(t => {
        t.setAttribute('aria-selected', 'false');
        t.setAttribute('tabindex', '-1');
      });
      tab.setAttribute('aria-selected', 'true');
      tab.removeAttribute('tabindex');

      document.querySelectorAll('[role="tabpanel"]').forEach(p => {
        p.classList.remove('active');
        p.hidden = true;
      });
      const panel = document.getElementById(tab.getAttribute('aria-controls'));
      panel.classList.add('active');
      panel.hidden = false;
    }

    /* -------- render helpers -------- */
    function directionLabel(dir) {
      return dir === 'north' ? 'Uptown' : 'Downtown';
    }

    function buildTrainItem(t) {
      const li = document.createElement('li');
      li.className = 'train-item' + (t.etaSeconds < 0 ? ' departed' : '');

      // full accessible label on the list item
      const etaText  = t.etaSeconds < 0 ? 'departed' : `arriving in ${t.etaFormatted}`;
      const dirText  = directionLabel(t.direction);
      li.setAttribute('aria-label',
        `${t.route} train, ${dirText} to ${t.destination}, ${etaText}`
      );

      li.innerHTML = `
        <span class="route-badge route-${t.route.toLowerCase()}" aria-hidden="true">${t.route}</span>
        <div class="train-info">
          <div class="train-destination">To ${t.destination}</div>
          <div class="train-direction">${dirText}</div>
        </div>
        <span class="train-eta ${t.etaSeconds < 0 ? 'departed' : 'arriving'}" aria-hidden="true">
          ${t.etaFormatted}
        </span>
      `;
      return li;
    }

    function renderFriendly(data) {
      const upcoming  = data.filter(t => t.etaSeconds >= 0);
      const departed  = data.filter(t => t.etaSeconds < 0).slice(0, 8);

      const upEl  = document.getElementById('upcoming-trains');
      const depEl = document.getElementById('departed-trains');

      upEl.innerHTML = '';
      depEl.innerHTML = '';

      if (upcoming.length) {
        upcoming.forEach(t => upEl.appendChild(buildTrainItem(t)));
      } else {
        upEl.innerHTML = '<li class="state-msg">No upcoming trains</li>';
      }

      if (departed.length) {
        departed.forEach(t => depEl.appendChild(buildTrainItem(t)));
      } else {
        depEl.innerHTML = '<li class="state-msg">No recent departures</li>';
      }

      // notify screen readers that data updated
      const count = upcoming.length;
      document.getElementById('arrivals-status').textContent =
        `Train data updated. ${count} upcoming train${count !== 1 ? 's' : ''}.`;
    }

    function renderRaw(data) {
      document.getElementById('raw-output').textContent =
        JSON.stringify(data, null, 2);
    }

    function setTimestamp() {
      const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('last-updated').textContent = `Last updated: ${now}`;
    }

    /* -------- data loading -------- */
    function loadData() {
      const btn = document.getElementById('refresh-btn');
      btn.setAttribute('aria-disabled', 'true');
      btn.disabled = true;

      document.getElementById('upcoming-trains').innerHTML =
        '<li class="state-msg" role="status">Loading…</li>';
      document.getElementById('departed-trains').innerHTML = '';
      document.getElementById('raw-output').textContent = 'Loading…';

      fetchJayStMetrotechData()
        .then(data => {
          renderFriendly(data);
          renderRaw(data);
          setTimestamp();
        })
        .catch(err => {
          const msg = 'Could not load data: ' + err.message;
          document.getElementById('upcoming-trains').innerHTML =
            `<li class="state-msg" role="alert">${msg}</li>`;
          document.getElementById('raw-output').textContent = msg;
          document.getElementById('arrivals-status').textContent = msg;
        })
        .finally(() => {
          btn.removeAttribute('aria-disabled');
          btn.disabled = false;
        });
    }

    // auto-refresh every 30 seconds
    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
